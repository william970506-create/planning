<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Heart-Sync 控制器</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/paho-mqtt/1.0.1/mqttws31.min.js" type="text/javascript"></script>
    
    <style>
        /* --- 全新質感大地色調方案 --- */
        :root {
            --bg-color: #fdfcf0;      
            --text-main: #433422;     
            --card-bg: #ffffff;
            --primary-oak: #a68664;   
            --secondary-sand: #e5e0d8;
            --accent-gold: #d4a373;   
            --status-green: #97a97c;  
            --error-red: #d9776c;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(60px); }
            to { opacity: 1; transform: translateY(0); }
        }

        body {
            font-family: "PingFang TC", "Hiragino Sans GB", "Microsoft JhengHei", sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden; 
        }

        .container {
            width: 90%;
            max-width: 360px;
            text-align: center;
            animation: fadeInUp 1.2s cubic-bezier(0.22, 1, 0.36, 1) forwards;
        }

        header h1 {
            font-size: 32px;
            font-weight: 300;
            letter-spacing: 2px;
            margin-bottom: 8px;
            color: var(--text-main);
        }

        #status-bar {
            font-size: 12px;
            letter-spacing: 1px;
            padding: 6px 16px;
            border-radius: 30px;
            margin-bottom: 30px;
            display: inline-block;
            transition: all 0.5s ease;
        }

        .status-online { background-color: #f1f3eb; color: var(--status-green); border: 1px solid #e2e8d8; }
        .status-offline { background-color: #f9f1f0; color: #bc6c25; border: 1px solid #ede0de; }

        .control-card, .info-card {
            background: var(--card-bg);
            padding: 32px 24px;
            border-radius: 32px;
            box-shadow: 0 15px 35px rgba(67, 52, 34, 0.04);
            margin-bottom: 24px;
            border: 1px solid rgba(166, 134, 100, 0.1);
        }

        /* --- 新增：輸入框樣式 --- */
        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .input-group p {
            font-size: 13px;
            margin: 0 0 10px 0;
            opacity: 0.6;
            letter-spacing: 1px;
            text-align: center;
        }

        #msg-input {
            width: 100%;
            padding: 16px 20px;
            border: 1px solid var(--secondary-sand);
            border-radius: 18px;
            font-size: 15px;
            font-family: inherit;
            color: var(--text-main);
            background-color: #faf8f5;
            outline: none;
            transition: all 0.3s ease;
            margin-bottom: 12px;
        }

        #msg-input:focus {
            border-color: var(--primary-oak);
            background-color: #fff;
            box-shadow: 0 4px 15px rgba(166, 134, 100, 0.1);
        }

        #msg-input::placeholder {
            color: #bcaaa4;
        }

        .btn {
            width: 100%;
            padding: 16px;
            margin: 6px 0;
            border: none;
            border-radius: 18px;
            font-size: 15px;
            font-weight: 500;
            letter-spacing: 2px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn-primary {
            background-color: var(--primary-oak);
            color: #fff;
            box-shadow: 0 4px 15px rgba(166, 134, 100, 0.2);
        }

        .btn-secondary {
            background-color: var(--secondary-sand);
            color: var(--text-main);
        }

        .btn:active { transform: scale(0.96); filter: brightness(0.9); }

        .info-card h3 {
            font-size: 13px;
            margin: 0 0 10px 0;
            font-weight: 400;
            opacity: 0.5;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        #bot-status { font-size: 16px; font-weight: 500; margin: 0; }

        footer {
            margin-top: 30px;
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
            opacity: 0.3;
        }

        /* --- 新增：浮動提示 (Toast) 動畫與樣式 --- */
        #toast {
            position: fixed;
            bottom: -60px;
            left: 50%;
            transform: translateX(-50%);
            background-color: var(--text-main);
            color: #fff;
            padding: 12px 24px;
            border-radius: 30px;
            font-size: 14px;
            letter-spacing: 1px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            transition: all 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            opacity: 0;
            z-index: 1000;
            pointer-events: none;
        }

        #toast.show {
            bottom: 40px;
            opacity: 1;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Heart-Sync</h1>
            <div id="status-bar" class="status-offline">Connecting...</div>
        </header>

        <main>
            <div class="control-card">
                <div class="input-group">
                    <p>你想傳遞什麼思念？</p>
                    <input type="text" id="msg-input" placeholder="輸入文字訊息..." autocomplete="off">
                    <button id="btn-send-msg" class="btn btn-primary">傳送訊息</button>
                </div>
                
                <div style="height: 1px; background: var(--secondary-sand); margin: 20px 0; opacity: 0.5;"></div>
                
                <p style="font-size: 12px; margin-bottom: 10px;">快速動作</p>
                <div style="display: flex; gap: 10px;">
                    <button id="btn-alert" class="btn btn-secondary" style="margin:0;">舉旗</button>
                    <button id="btn-clear" class="btn btn-secondary" style="margin:0;">放下</button>
                </div>
            </div>

            <div class="info-card">
                <h3>Robot Status</h3>
                <p id="bot-status">等待同步中</p>
            </div>
        </main>

        <footer>
            <p>© 2026 Heart-Sync Protocol</p>
        </footer>
    </div>

    <div id="toast">發送成功</div>

    <script>
        // MQTT 配置
        const MQTT_HOST = "a58c5e1007e94bcea2641a1d027cd2f9.s1.eu.hivemq.cloud";
        const MQTT_PORT = 8884; // WebSocket SSL port
        const MQTT_CLIENT_ID = "web_ctrl_" + Math.random().toString(16).substr(2, 5);
        const TOPIC_CMD = "flagbot/cmd";
        const TOPIC_TEXT = "screen/text";
        const TOPIC_STATUS = "flagbot/status";

        let isConnected = false; // 追蹤連線狀態
        const client = new Paho.MQTT.Client(MQTT_HOST, MQTT_PORT, MQTT_CLIENT_ID);

        // 顯示提示訊息的函式
        function showToast(message, isError = false) {
            const toast = document.getElementById("toast");
            toast.innerText = message;
            toast.style.backgroundColor = isError ? "var(--error-red)" : "var(--status-green)";
            toast.classList.add("show");
            setTimeout(() => {
                toast.classList.remove("show");
            }, 2500);
        }

        client.onConnectionLost = (responseObject) => {
            isConnected = false;
            const bar = document.getElementById("status-bar");
            bar.innerText = "連線已中斷";
            bar.className = "status-offline";
        };

        client.onMessageArrived = (message) => {
            document.getElementById("bot-status").innerText = message.payloadString.toUpperCase();
        };

        const options = {
            onSuccess: () => {
                isConnected = true;
                const bar = document.getElementById("status-bar");
                bar.innerText = "已連線 (Online)";
                bar.className = "status-online";
                client.subscribe(TOPIC_STATUS);
            },
            onFailure: (e) => {
                isConnected = false;
                document.getElementById("status-bar").innerText = "連線失敗";
                showToast("伺服器連線失敗", true);
            }
        };

        options.userName = "william";
        options.password = "William970506";
        options.useSSL = true;
        options.keepAliveInterval = 30;
        options.reconnect = true;
        client.connect(options);

        // 發送文字訊息
        document.getElementById("btn-send-msg").onclick = () => {
            const input = document.getElementById("msg-input");
            const text = input.value.trim();

            if (!isConnected) {
                showToast("尚未連線，發送失敗", true);
                return;
            }
            if (!text) {
                showToast("請先輸入訊息內容", true);
                return;
            }

            const msg = new Paho.MQTT.Message(text);
            msg.destinationName = TOPIC_TEXT; // 發送到新的主題
            client.send(msg);
            
            showToast("訊息發送成功！");
            input.value = ""; // 清空輸入框
        };

        // 快速動作
        document.getElementById("btn-alert").onclick = () => {
            if (!isConnected) return showToast("尚未連線，操作失敗", true);
            const msg = new Paho.MQTT.Message("alert");
            msg.destinationName = TOPIC_CMD;
            client.send(msg);
            showToast("指令已發送");
        };

        document.getElementById("btn-clear").onclick = () => {
            if (!isConnected) return showToast("尚未連線，操作失敗", true);
            const msg = new Paho.MQTT.Message("clear");
            msg.destinationName = TOPIC_CMD;
            client.send(msg);
            showToast("指令已發送");
        };
    </script>
</body>
</html>
